<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Detalle de película del proyecto CineReview Javier.">
  <title>Detalle de película | CineReview Javier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar navbar-expand-lg navbar-dark container" aria-label="Menú principal">
      <a class="navbar-brand fw-bold" href="index.html"><span class="brand-icon">🎬</span> CineReview Javier</a>
      <a href="index.html#peliculas" class="btn btn-sm btn-outline-light">Volver al catálogo</a>
    </nav>
  </header>

  <main>
    <section class="detail-hero">
      <div class="container">
        <a href="index.html" class="btn btn-outline-dark mb-4">← Volver al listado</a>
        <div id="detallePelicula" class="row g-4 align-items-center"></div>
      </div>
    </section>

    <section class="container section-block pt-0">
      <div class="comment-box">
        <div class="section-heading section-heading--left">
          <span>Participación del usuario</span>
          <h2>Comentarios</h2>
          <p>Funcionalidad complementaria para registrar opiniones durante la sesión.</p>
        </div>
        <form id="formComentario" class="card shadow-sm border-0 p-4 mb-4">
          <div class="row g-3">
            <div class="col-12 col-md-4">
              <label for="nombre" class="form-label fw-semibold">Nombre</label>
              <input id="nombre" class="form-control" placeholder="Escribe tu nombre" required>
            </div>
            <div class="col-12 col-md-8">
              <label for="comentario" class="form-label fw-semibold">Comentario</label>
              <textarea id="comentario" class="form-control" rows="3" placeholder="Escribe tu opinión" required></textarea>
            </div>
          </div>
          <button class="btn btn-warning fw-semibold mt-3" type="submit">Agregar comentario</button>
        </form>
        <div id="listaComentarios" class="vstack gap-3"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__content">
      <p>CineReview Javier — Sitio responsive con Bootstrap y Sass</p>
      <p>Javier Andrés Barrera Cárdenas</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
